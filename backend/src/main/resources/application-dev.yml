spring:
  datasource:
    url: jdbc:mysql://localhost:13306/my_project_db
    username: app
    password: app1234

  jpa:
    show-sql: true # jpa가 실행한 sql문 콘솔에 출력

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  data:
    redis:
      host: localhost
      port: 6379
      # password는 application-secret.yml(gitignore)에서 주입 — 하드코딩된 기본값을 두지 않음

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    com.team10.backend.domain.user.application.ocr: DEBUG

cors:
  allowed-origins: http://localhost:3000