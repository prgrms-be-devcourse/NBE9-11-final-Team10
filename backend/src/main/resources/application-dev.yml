spring:
  datasource:
    url: jdbc:mysql://localhost:13306/my_project_db
    username: app
    password: app1234

  jpa:
    show-sql: true # jpa가 실행한 sql문 콘솔에 출력

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  data:
    redis:
      host: localhost
      port: 6379
      # password는 application-secret.yml(gitignore)에서 주입 — 하드코딩된 기본값을 두지 않음

logging:
  level:
    # bind/extract TRACE는 모든 SQL의 바인드/추출 값(이메일·전화번호·생년월일 등 PII성 컬럼 포함)을
    # 평문으로 로그에 남기므로 비활성화. SQL 문 자체는 위 show-sql/format_sql로 계속 확인 가능.
    com.team10.backend.domain.user.ocr: DEBUG

cors:
  allowed-origins: http://localhost:3000