spring:
  datasource:
    url: jdbc:mysql://localhost:13306/my_project_db
    username: app
    password: app1234

  jpa:
    hibernate:
      ddl-auto: update # prod 환경에서 반드시 validate or none 으로 수정

    show-sql: true # jpa가 실행한 sql문 콘솔에 출력

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  data:
    redis:
      host: localhost
      port: 6379

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    # bind/extract TRACE는 SQL 바인드 파라미터(주민등록번호 등 PII 포함 가능)를 평문으로 로그에 남기므로 비활성화.
    # SQL 문 자체는 show-sql/format_sql로 충분히 확인 가능.
    com.team10.backend.domain.user.ocr: DEBUG