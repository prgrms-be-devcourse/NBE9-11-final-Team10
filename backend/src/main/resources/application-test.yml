spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-for-unit-testing-only-minimum32chars
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 604800

ocr:
  google-vision-key-path: classpath:dummy-key.json

exchange-rate:
  sync:
    enabled: false
