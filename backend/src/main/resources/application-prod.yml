spring:
  # 운영 DB 설정 - ec2 instance
  # datasource:

  jpa:
    hibernate:
      ddl-auto: validate # 운영 환경에서는 db 자동 업데이트 금지

    show-sql: false

    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false

# RT 쿠키 Secure 플래그 — 운영은 반드시 HTTPS이므로 true
cookie:
  secure: true

app:
  encryption:
    # 운영 키는 코드/레포에 두지 않고 반드시 ENCRYPTION_KEY 환경변수로 주입 (기본값 없음 → 미설정 시 기동 실패)
    key: ${ENCRYPTION_KEY}

# 운영 환경에서는 로그 출력을 최소화
logging:
  level:
    com.team10: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
    org.hibernate.orm.jdbc.extract: INFO
    org.springframework.transaction.interceptor: INFO

