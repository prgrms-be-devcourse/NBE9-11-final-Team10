spring:
  datasource:
    url: jdbc:mysql://mysql:3306/snaptix
    username: root
    password: ${MYSQL_ROOT_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  jpa:
    show-sql: false

    properties:
      hibernate:
        format_sql: false
        highlight_sql: false
        use_sql_comments: false
# Actuator
management:
  endpoint:
    health:
      show-details: never

# RT 쿠키 Secure 플래그 — 운영은 반드시 HTTPS이므로 true
cookie:
  secure: true

# 운영 환경에서는 로그 출력을 최소화
logging:
  level:
    com.team10: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
    org.hibernate.orm.jdbc.extract: INFO
    org.springframework.transaction.interceptor: INFO

cors:
  allowed-origins: https://0bank.shop,https://www.0bank.shop,https://api.0bank.shop

openapi:
  server-url: https://api.0bank.shop