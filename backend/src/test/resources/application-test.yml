spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 50

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

cors:
  allowed-origins: http://localhost:3000

ocr:
  google-vision-key-path: classpath:gcp-key.json

exchange-rate:
  sync:
    enabled: false


kis:
  app-key: test-key
  app-secret: test-secret

young-policy:
  api-key: test-key

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long!
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 604800

security:
  hmac:
    secret: dGVzdC1obWFjLXNlY3JldA==

codef:
  client-id: test-client-id
  client-secret: test-client-secret
  public-key: 

portone:
  api-secret: test-portone-secret
  store-id: test-store-id
  channel-key: test-channel-key
