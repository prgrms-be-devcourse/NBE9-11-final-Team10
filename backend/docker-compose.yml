services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always # 컨테이너 종료 시 자동 재시작

    ports:
      - "13306:3306" # 호스트포트:컨테이너포트 (localhost:13306 으로 접속)

    # MySQL 서버 기본 설정
    command:
      - --character-set-server=utf8mb4 # 한글 및 이모지 저장 지원
      - --collation-server=utf8mb4_unicode_ci # 문자열 정렬/비교 규칙

    # 컨테이너 환경 변수
    environment:
      TZ: Asia/Seoul # 컨테이너 타임존 설정

      MYSQL_ROOT_PASSWORD: 1234 # root 계정 비밀번호
      MYSQL_DATABASE: my_project_db # 컨테이너 최초 실행 시 생성할 DB

      MYSQL_USER: app # 애플리케이션 전용 계정
      MYSQL_PASSWORD: app1234 # 애플리케이션 계정 비밀번호

    volumes:
      # MySQL 데이터 영속화 (컨테이너 삭제 후에도 데이터 유지)
      - ./db/mysql/data:/var/lib/mysql

      # 초기 SQL 스크립트 실행 경로
      # *.sql, *.sh 파일이 최초 컨테이너 생성 시 자동 실행됨
      - ./db/mysql/init:/docker-entrypoint-initdb.d

    # MySQL 정상 기동 여부 확인
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s # 10초마다 체크
      timeout: 5s # 5초 내 응답 없으면 실패
      retries: 5 # 5회 연속 실패 시 unhealthy 처리

  redis:
    image: redis:7.2-alpine # CI(ci.yml)와 동일 버전
    container_name: redis
    restart: always # 컨테이너 종료 시 자동 재시작

    # requirepass로 비인증 접근 차단. REDIS_PASSWORD는 .env 대신 OS 환경변수로 주입(기본값 없음) —
    # set-redis-password.bat으로 등록하며, application-secret.yml의 spring.data.redis.password와 동일한 값을 써야 로컬에서 연결된다.
    command: redis-server --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379" # 호스트포트:컨테이너포트 (localhost:6379 으로 접속)

    # 로그인 실패 횟수, 1원송금 시도 제한, RT/분산락 등 모두 TTL 기반 임시 데이터라 영속화 볼륨은 두지 않음

    # Redis 정상 기동 여부 확인 (requirepass 설정 후에는 인증 없이 ping하면 NOAUTH로 실패함)
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

