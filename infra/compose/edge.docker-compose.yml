services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      TZ: Asia/Seoul
    volumes:
      - /dockerProjects/npm/data:/data
      - /dockerProjects/npm/letsencrypt:/etc/letsencrypt