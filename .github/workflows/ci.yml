name: CI

on:
  # develop 또는 main 대상으로 PR 생성/수정 시 실행
  pull_request:
    branches:
      - develop
      - main

  # main , develop 브랜치 직접 push 시 실행
  push:
    branches:
      - main
      - develop

jobs:
  test:
    # GitHub에서 제공하는 Ubuntu 환경에서 실행
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드 체크아웃
      - uses: actions/checkout@v4

      # Java 25 환경 설정
      # Gradle 캐시를 사용하여 의존성 다운로드 시간 단축
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # gradlew 실행 권한 부여
      # Linux 환경에서는 실행 권한이 없으면 Gradle Wrapper 실행 불가
      - name: Grant execute permission
        working-directory: backend
        run: chmod +x gradlew

      # 전체 빌드 수행
      # clean : 이전 빌드 결과 제거
      # build : 컴파일 + 테스트 + 패키징 검증
      - name: Build and Test
        working-directory: backend
        run: ./gradlew clean build