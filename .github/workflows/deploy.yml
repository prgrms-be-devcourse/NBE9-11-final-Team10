name: deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "backend/**"

permissions:
  contents: read
  packages: write

jobs:
  build-image-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ghcr.io/${{ github.repository_owner }}/team10-backend:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: application-secret.yml 생성
        run: |
          mkdir -p backend/src/main/resources
          echo "${{ secrets.APPLICATION_SECRET }}" \
          > backend/src/main/resources/application-secret.yml

      - name: Verify secret file
        run: |
          ls -al backend/src/main/resources
          head -5 backend/src/main/resources/application-secret.yml

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: |
          cd backend
          ./gradlew bootJar --no-daemon

      - name: Verify built JAR
        run: |
          unzip -l backend/build/libs/*.jar | grep application
          unzip -l backend/build/libs/*.jar | grep application-secret

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/team10-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/team10-backend:latest

      - name: Verify app.jar in image
        run: |
          docker create --name temp ghcr.io/${{ github.repository_owner }}/team10-backend:${{ github.sha }}
          docker cp temp:/app/app.jar .
          unzip -l app.jar | grep application
          unzip -l app.jar | grep application-secret
          docker rm temp
  

  deploy:
    needs: build-image-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: APP-DATA 인스턴스 조회
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
          --filters \
          "Name=tag:Name,Values=team10-app-data-ec2" \
          "Name=instance-state-name,Values=running" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Deploy
        run: |
          COMMAND_ID=$(
            aws ssm send-command \
              --instance-ids "${{ env.INSTANCE_ID }}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy backend" \
              --query "Command.CommandId" \
              --output text \
              --parameters 'commands=[
                "export GHCR_USERNAME=\"${{ secrets.GHCR_USERNAME }}\"",
                "export GHCR_TOKEN=\"${{ secrets.GHCR_TOKEN }}\"",
                "bash /dockerProjects/app-data/deploy.sh ghcr.io/${{ github.repository_owner }}/team10-backend:${{ github.sha }}"
              ]'
          )

          echo "Command ID: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" \
              --output text)

            echo "Current Status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text
              break
            fi

            if [[ "$STATUS" == "Failed" || \
                  "$STATUS" == "Cancelled" || \
                  "$STATUS" == "TimedOut" ]]; then

              echo "===== STDOUT ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text

              echo "===== STDERR ====="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text

              exit 1
            fi

            sleep 5
          done